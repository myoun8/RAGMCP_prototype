<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NCNR Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ══════════════════════════════════════
       WELCOME STATE  (body has no .chatting)
       ══════════════════════════════════════ */
    body:not(.chatting) {
      justify-content: center;
      gap: 28px;
    }
    body:not(.chatting) #chat { display: none; }

    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      user-select: none;
    }
    body.chatting #welcome { display: none; }

    #welcome .logo {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #c96442;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 24px; font-weight: 700;
      margin-bottom: 6px;
    }
    #welcome h1 { font-size: 26px; font-weight: 600; color: #1a1a1a; }
    #welcome p  { font-size: 14px; color: #999; }

    /* ══════════════════════════════════════
       CHAT STATE  (body.chatting)
       ══════════════════════════════════════ */
    #chat {
      flex: 1;
      width: 100%;
      max-width: 736px;
      overflow-y: auto;
      padding: 48px 24px 8px;
      scroll-behavior: smooth;
    }

    /* ── Message turns ── */
    .turn { margin-bottom: 32px; }

    /* User */
    .user-turn { display: flex; justify-content: flex-end; }
    .user-bubble {
      background: #ede9e3;
      border-radius: 18px;
      padding: 10px 16px;
      max-width: 78%;
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Assistant */
    .assistant-turn { display: flex; gap: 14px; align-items: flex-start; }
    .avatar {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #c96442;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 12px; font-weight: 700;
      margin-top: 1px;
    }
    .assistant-body { flex: 1; min-width: 0; }

    /* ── Status bar (shown during processing) ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #777;
    }
    .spinner {
      flex-shrink: 0;
      width: 13px; height: 13px;
      border: 2px solid #e0dcd6;
      border-top-color: #c96442;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text { flex: 1; }
    .details-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 2px 9px;
      font-size: 12px;
      color: #777;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s;
    }
    .details-btn:hover { background: #f0ede6; color: #444; }

    /* ── Steps summary toggle (after completion) ── */
    .steps-summary {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      user-select: none;
      border: none;
      background: none;
      padding: 0;
      font-family: inherit;
    }
    .steps-summary:hover { color: #444; }
    .steps-summary .chevron {
      font-size: 10px;
      transition: transform 0.2s;
      display: inline-block;
    }
    .steps-summary.open .chevron { transform: rotate(90deg); }

    /* ── Steps panel ── */
    .steps-panel {
      border: 1px solid #e8e4de;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
      font-size: 13px;
    }
    .steps-panel[hidden] { display: none; }

    .step-item {
      padding: 10px 14px;
      border-bottom: 1px solid #ede9e3;
    }
    .step-item:last-child { border-bottom: none; }
    .step-name {
      font-weight: 600; font-size: 12px; color: #555;
      margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .step-label {
      font-size: 11px; color: #999; margin-bottom: 3px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .step-code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px; color: #333;
      background: #f5f2ed; border-radius: 6px;
      padding: 7px 10px; white-space: pre-wrap; word-break: break-word;
      max-height: 180px; overflow-y: auto; margin-bottom: 8px;
    }
    .step-code:last-child { margin-bottom: 0; }
    .step-code.pending { color: #aaa; font-style: italic; }

    /* ── Response text ── */
    .response-body { font-size: 15px; line-height: 1.7; color: #1a1a1a; }
    .response-body p               { margin: 0 0 10px; }
    .response-body p:last-child    { margin-bottom: 0; }
    .response-body h1,
    .response-body h2,
    .response-body h3              { font-weight: 600; margin: 14px 0 6px; }
    .response-body ul,
    .response-body ol              { padding-left: 22px; margin: 6px 0; }
    .response-body li              { margin: 3px 0; }
    .response-body code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 13px; background: #efece6;
      padding: 1px 5px; border-radius: 4px;
    }
    .response-body pre {
      background: #f3f0ea; border-radius: 10px;
      padding: 14px 16px; overflow-x: auto; margin: 8px 0;
    }
    .response-body pre code { background: none; padding: 0; font-size: 13px; }
    .response-body table {
      border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 14px;
    }
    .response-body th, .response-body td {
      border: 1px solid #ddd; padding: 6px 10px; text-align: left;
    }
    .response-body th { background: #f0ede6; font-weight: 600; }

    .cursor {
      display: inline-block; width: 2px; height: 1em;
      background: #c96442; margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* ══════════════════════════════════════
       INPUT WRAP  (shared by both states)
       ══════════════════════════════════════ */
    #input-wrap {
      width: 100%;
      max-width: 736px;
      padding: 0 24px 28px;
    }
    /* give the bottom bar some top breathing room only in chat mode */
    body.chatting #input-wrap { padding-top: 8px; }

    #input-box {
      background: #fff;
      border: 1px solid #e0ddd7;
      border-radius: 18px;
      padding: 14px 14px 12px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #user-input {
      border: none; outline: none; resize: none;
      font-family: inherit; font-size: 15px; line-height: 1.55;
      min-height: 26px; max-height: 180px; overflow-y: auto;
      background: transparent; color: #1a1a1a;
    }
    #user-input::placeholder { color: #aaa; }
    #input-footer { display: flex; justify-content: flex-end; }
    #send-btn {
      width: 34px; height: 34px;
      border-radius: 10px; border: none;
      background: #1a1a1a; color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    #send-btn:disabled { background: #d8d4cd; cursor: default; }
    #send-btn:not(:disabled):hover { background: #3a3a3a; }
    #send-btn svg { width: 16px; height: 16px; }
    #footer-note {
      text-align: center; font-size: 11px;
      color: #bbb; margin-top: 6px;
    }
  </style>
</head>
<body>

  <!-- Welcome header — visible only before first message -->
  <div id="welcome">
    <div class="logo">N</div>
    <h1>NCNR Assistant</h1>
    <p>Ask about instruments, experiments, or documentation.</p>
  </div>

  <!-- Messages — visible only after first message -->
  <div id="chat"></div>

  <!-- Input box — lives in page flow (welcome) or sticks to bottom (chat) -->
  <div id="input-wrap">
    <div id="input-box">
      <textarea id="user-input" placeholder="Message NCNR Assistant…" rows="1"></textarea>
      <div id="input-footer">
        <button id="send-btn" disabled aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/>
            <polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="footer-note">NCNR RAG · responses may be incomplete</div>
  </div>

  <script>
    marked.setOptions({ breaks: true });

    const chatEl  = document.getElementById('chat');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const threadId = 'session_' + Math.random().toString(36).slice(2);

    /* ── auto-resize textarea ── */
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = inputEl.scrollHeight + 'px';
      sendBtn.disabled = !inputEl.value.trim();
    });

    function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

    /* ── switch to chat layout on first message ── */
    function enterChatMode() {
      if (!document.body.classList.contains('chatting')) {
        document.body.classList.add('chatting');
      }
    }

    /* ── add user bubble ── */
    function addUserTurn(text) {
      enterChatMode();
      const turn   = document.createElement('div');
      turn.className = 'turn user-turn';
      const bubble = document.createElement('div');
      bubble.className = 'user-bubble';
      bubble.textContent = text;
      turn.appendChild(bubble);
      chatEl.appendChild(turn);
      scrollBottom();
    }

    /* ── create an assistant turn shell, return live refs ── */
    function createAssistantTurn() {
      const turn = document.createElement('div');
      turn.className = 'turn assistant-turn';

      const av = document.createElement('div');
      av.className = 'avatar';
      av.textContent = 'N';

      const body = document.createElement('div');
      body.className = 'assistant-body';

      const statusBar  = document.createElement('div');
      statusBar.className = 'status-bar';

      const spinner    = document.createElement('div');
      spinner.className = 'spinner';

      const statusTxt  = document.createElement('span');
      statusTxt.className = 'status-text';
      statusTxt.textContent = 'Thinking…';

      const detailsBtn = document.createElement('button');
      detailsBtn.className = 'details-btn';
      detailsBtn.textContent = 'Details ▾';

      statusBar.appendChild(spinner);
      statusBar.appendChild(statusTxt);
      statusBar.appendChild(detailsBtn);

      const stepsPanel = document.createElement('div');
      stepsPanel.className = 'steps-panel';
      stepsPanel.hidden = true;

      const responseEl = document.createElement('div');
      responseEl.className = 'response-body';

      body.appendChild(statusBar);
      body.appendChild(stepsPanel);
      body.appendChild(responseEl);
      turn.appendChild(av);
      turn.appendChild(body);
      chatEl.appendChild(turn);
      scrollBottom();

      let detailsOpen = false;
      detailsBtn.addEventListener('click', () => {
        detailsOpen = !detailsOpen;
        stepsPanel.hidden = !detailsOpen;
        detailsBtn.textContent = detailsOpen ? 'Details ▴' : 'Details ▾';
        scrollBottom();
      });

      return { body, statusBar, statusTxt, detailsBtn, stepsPanel, responseEl };
    }

    /* ── add a step item to the panel ── */
    function addStepStart(stepsPanel, name, input) {
      const item = document.createElement('div');
      item.className = 'step-item';

      const nameEl   = document.createElement('div');
      nameEl.className = 'step-name';
      nameEl.textContent = name;

      const inLabel  = document.createElement('div');
      inLabel.className = 'step-label';
      inLabel.textContent = 'Input';

      const inCode   = document.createElement('div');
      inCode.className = 'step-code';
      inCode.textContent = input || '—';

      const outLabel = document.createElement('div');
      outLabel.className = 'step-label';
      outLabel.textContent = 'Output';

      const outCode  = document.createElement('div');
      outCode.className = 'step-code pending';
      outCode.textContent = 'waiting…';

      item.append(nameEl, inLabel, inCode, outLabel, outCode);
      stepsPanel.appendChild(item);
      return outCode;
    }

    /* ── finalize turn after stream ends ── */
    function finalizeTurn(refs, steps, rawText) {
      const { body, statusBar, stepsPanel, responseEl } = refs;

      statusBar.remove();

      if (steps.length > 0) {
        const summary = document.createElement('button');
        summary.className = 'steps-summary';
        summary.innerHTML =
          `<span class="chevron">▶</span> ${steps.length} step${steps.length > 1 ? 's' : ''}`;

        let open = false;
        summary.addEventListener('click', () => {
          open = !open;
          stepsPanel.hidden = !open;
          summary.classList.toggle('open', open);
          scrollBottom();
        });

        body.insertBefore(summary, stepsPanel);
        stepsPanel.hidden = true;
      } else {
        stepsPanel.remove();
      }

      responseEl.innerHTML = rawText
        ? marked.parse(rawText)
        : '<em style="color:#aaa">No response.</em>';

      scrollBottom();
    }

    /* ── main send ── */
    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addUserTurn(text);
      const refs = createAssistantTurn();
      const { statusTxt, stepsPanel, responseEl } = refs;

      let rawText     = '';
      let steps       = [];
      let stepPending = {};
      let cursor      = null;

      function ensureCursor() {
        if (!cursor) {
          cursor = document.createElement('span');
          cursor.className = 'cursor';
          responseEl.appendChild(cursor);
        }
      }
      function removeCursor() { cursor?.remove(); cursor = null; }

      function handleEvent(data) {
        switch (data.type) {
          case 'status':
            statusTxt.textContent = data.text;
            break;

          case 'step_start': {
            const outCodeEl = addStepStart(stepsPanel, data.name, data.input);
            stepPending[data.name] = outCodeEl;
            steps.push({ name: data.name, outCodeEl });
            scrollBottom();
            break;
          }

          case 'step_end': {
            const el = stepPending[data.name];
            if (el) {
              el.classList.remove('pending');
              el.textContent = data.output || '—';
              delete stepPending[data.name];
            }
            break;
          }

          case 'token':
            rawText += data.text;
            removeCursor();
            responseEl.textContent = rawText;
            ensureCursor();
            scrollBottom();
            break;

          case 'error':
            rawText = `_Error: ${data.text}_`;
            break;

          case 'done':
            removeCursor();
            finalizeTurn(refs, steps, rawText);
            sendBtn.disabled = false;
            inputEl.focus();
            break;
        }
      }

      try {
        const response = await fetch('/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, thread_id: threadId }),
        });

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try { handleEvent(JSON.parse(line.slice(6))); } catch (_) {}
            }
          }
        }

        handleEvent({ type: 'done' });

      } catch (_) {
        finalizeTurn(refs, steps, '_Error reaching the server._');
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
  </script>
</body>
</html>
